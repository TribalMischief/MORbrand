<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOR — Wealth with Purpose · Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --forest: #1B4332;
      --forest-deep: #0F2A1F;
      --grove: #2D6A4F;
      --moss: #52796F;
      --brass: #B5892A;
      --brass-soft: #D4A84A;
      --ivory: #F5F1EB;
      --ivory-deep: #ECE6DA;
      --parchment: #FAF7F1;
      --slate: #4A5568;
      --slate-soft: #7A8290;
      --ink: #1C1C1C;
      --ash: #3D3D3D;
      --rule: rgba(27,67,50,0.14);
      --rule-strong: rgba(27,67,50,0.28);
    }
    * , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--ivory); color: var(--ink); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; }
    a { color: inherit; }
    button { font-family: inherit; }
    ::selection { background: var(--forest); color: var(--ivory); }

    /* page chrome — out of React component scope so it loads instantly */
    .ds-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .ds-loading { padding: 80px 64px; font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--forest); }

    /* shared utility */
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.02em; }
    .eyebrow { font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--brass); font-weight: 500; }
    .rule-thin { height: 1px; background: var(--rule); }
    .rule-strong { height: 1px; background: var(--rule-strong); }

    /* triple-rule mark — pure CSS so we never hand-draw an SVG */
    .triple-mark { display: inline-flex; flex-direction: column; gap: 3px; }
    .triple-mark > span { display: block; height: 2px; border-radius: 1px; }
    .triple-mark.size-sm > span { height: 1.5px; }
    .triple-mark.size-lg > span { height: 3px; gap: 5px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"><div class="ds-shell"><div class="ds-loading">Loading the system…</div></div></div>

  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/foundations.jsx"></script>
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/patterns.jsx"></script>
  <script type="text/babel" src="src/applications.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
